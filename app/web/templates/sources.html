{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>Sources</h1>
  <table class="table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Path</th>
        <th>Distro</th>
        <th>User</th>
        <th>Enabled</th>
      </tr>
    </thead>
    <tbody>
      {% for s in sources %}
      <tr>
        <td>{{ s.name }}</td>
        <td><code>{{ s.root_path }}</code></td>
        <td>{{ s.distro or "" }}</td>
        <td>{{ s.user_name or "" }}</td>
        <td>{{ "yes" if s.enabled else "no" }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
